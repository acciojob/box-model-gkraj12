 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 300px;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid black;
            margin: 5px auto;
            text-align: center;
			background-color: darkgray;
			
        }
        .container div{
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: inline-block;
            margin: 10px;
        }
        .green{
            background-color: green;
        }
        .yellow{
            background-color: yellow;
        }
        .red{
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="green"></div>
        <div class="yellow"></div>
        <div class="red"></div>
    </div>
    
</body>
</html>
